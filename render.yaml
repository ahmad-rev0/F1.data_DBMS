# Render Blueprint: Django only. MySQL runs elsewhere (e.g. Aiven free tier).
# https://render.com/docs/blueprint-spec
#
# After deploy: set Aiven connection values (MYSQL_HOST, etc.) in the dashboard if not prompted.
# Full checklist: DEPLOYMENT.md
services:
  - type: web
    name: f1-platform
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DJANGO_PRODUCTION
        value: "true"
      - key: RENDER
        value: "true"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        sync: false
      - key: MYSQL_USE_SSL
        value: "true"
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_PORT
        sync: false
      - key: MYSQL_DATABASE
        sync: false
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
